<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice to Jira</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #f4f3ee;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
  }
  .panel {
    background: #fff;
    border: 1px solid #e0ddd3;
    border-radius: 12px;
    padding: 16px;
  }
  .chat-panel { display: flex; flex-direction: column; height: 620px; }
  .messages { flex: 1; overflow-y: auto; padding: 8px 4px; }
  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-bottom: 10px;
    line-height: 1.45;
    font-size: 14.5px;
    white-space: pre-wrap;
  }
  .bubble.user { background: #dce7f7; margin-left: auto; border-bottom-right-radius: 4px; }
  .bubble.agent { background: #eee9dd; margin-right: auto; border-bottom-left-radius: 4px; }
  .bubble.system { background: #dff0e0; margin: 0 auto; text-align: center; font-size: 13px; }
  .bubble.error { background: #f7dcdc; margin-right: auto; }
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 12px;
    border-top: 1px solid #eee;
  }
  #mic-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 22px;
    background: #3a6fd8; color: white;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #mic-btn.recording { background: #d8503a; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(216,80,58,0.4);} 50% { box-shadow: 0 0 0 10px rgba(216,80,58,0);} }
  #status { font-size: 13px; color: #777; flex: 1; }
  #text-fallback {
    flex: 1; padding: 10px 12px; border-radius: 20px; border: 1px solid #ddd;
    font-size: 14px;
  }
  h3 { margin-top: 0; font-size: 15px; }
  .field-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0efe9; font-size: 13px; }
  .field-row .label { color: #888; }
  .field-row .value { font-weight: 600; text-align: right; max-width: 60%; }
  .field-row .value.empty { color: #bbb; font-weight: 400; }
</style>
</head>
<body>
<div class="app">

  <div class="panel chat-panel">
    <h3>Voice to Jira</h3>
    <div id="jira-connect-bar" style="margin-bottom: 12px; font-size: 14px;"></div>
    <div class="messages" id="messages"></div>
    <div class="controls">
      <button id="mic-btn" title="Click to talk">&#127908;</button>
      <input id="text-fallback" placeholder="...or type instead of talking" />
      <span id="status">Click the mic to start</span>
    </div>
  </div>

  <div class="panel">
    <h3>Ticket draft</h3>
    <div id="draft-fields"></div>
  </div>

</div>

</script>

<script>
  async function refreshJiraConnectionStatus() {
    const bar = document.getElementById("jira-connect-bar");
    try {
      const res = await fetch("/auth/jira/status");
      const status = await res.json();

      if (status.connected) {
        bar.innerHTML = `
          <div style="display: flex; align-items: center; justify-content: space-between; background: #e3fcef; border: 1px solid #abf5d1; padding: 12px 16px; border-radius: 8px;">
            <div style="color: #006644; font-size: 13px;">
              Connected to <strong>${status.site_name}</strong>
            </div>
            <a href="#" id="jira-disconnect-link" style="color: #006644; text-decoration: underline; font-weight: 500;">Disconnect</a>
          </div>
        `;
        document.getElementById("jira-disconnect-link").onclick = async (e) => {
          e.preventDefault();
          await fetch("/auth/jira/disconnect", { method: "POST" });
          refreshJiraConnectionStatus();
        };
      } else {
        bar.innerHTML = `
          <div style="display: flex; align-items: center; justify-content: space-between; background: #fafbfc; border: 1px solid #dfe1e6; padding: 12px 16px; border-radius: 8px;">
            <div style="color: #42526e; font-size: 13px;">
              <strong style="color: #172b4d;">Bring your own Jira</strong><br/>
              Otherwise, tickets will go to the demo Jira.
            </div>
            <a href="/auth/jira/login" style="display: inline-flex; align-items: center; gap: 8px; background: #0052CC; color: white; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-weight: 500; font-size: 14px; transition: background 0.2s;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="white" xmlns="http://www.w3.org/2400/svg">
                <path d="M11.66 12.34c-1.37-1.37-1.37-3.59 0-4.96l4.28-4.28c.38-.38 1.01-.38 1.4 0l4.28 4.28c1.37 1.37 1.37 3.59 0 4.96l-4.28 4.28c-.38.38-1.01.38-1.4 0l-4.28-4.28zM3.44 20.56c1.37 1.37 3.59 1.37 4.96 0l4.28-4.28c.38-.38.38-1.01 0-1.4l-4.28-4.28c-1.37-1.37-3.59-1.37-4.96 0l-4.28 4.28c-.38.38-.38 1.01 0 1.4l4.28 4.28zM11.66 20.56c1.37 1.37 3.59 1.37 4.96 0l4.28-4.28c.38-.38.38-1.01 0-1.4l-4.28-4.28c-1.37-1.37-3.59-1.37-4.96 0l-4.28 4.28c-.38.38-.38 1.01 0 1.4l4.28 4.28z"/>
              </svg>
              Connect to Jira
            </a>
          </div>
        `;
      }
    } catch (err) {
      // If this fails, just don't show the bar -- never block the chat over it.
      bar.innerHTML = "";
    }
  }

  // Show a friendly message if the OAuth redirect came back with an error.
  const params = new URLSearchParams(window.location.search);
  if (params.get("jira_error")) {
    alert("Couldn't connect your Jira: " + params.get("jira_error"));
    window.history.replaceState({}, "", "/");
  }

  refreshJiraConnectionStatus();
</script>

<script>
const FIELD_ORDER = ["project", "issuetype", "summary", "description", "priority", "assignee_name", "labels"];
const messagesEl = document.getElementById("messages");
const micBtn = document.getElementById("mic-btn");
const statusEl = document.getElementById("status");
const textInput = document.getElementById("text-fallback");
const draftEl = document.getElementById("draft-fields");

let ws = null;
let mediaRecorder = null;
let chunks = [];
let recording = false;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => setStatus("Connected. Click the mic to start.");
  ws.onclose = () => setStatus("Disconnected.");
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "transcript") {
      addBubble("user", msg.text);
    } else if (msg.type === "agent") {
      addBubble("agent", msg.text);
      speak(msg.text);
      renderDraft(msg.draft || {});
      if (msg.ticket_created) {
        let successMsg = "Ticket created. Conversation complete.";
        if (msg.ticket_url) {
          successMsg = `Ticket created: <a href="${msg.ticket_url}" target="_blank">${msg.ticket_url}</a>. Conversation complete.`;
        }
        addBubble("system", successMsg, true);
        micBtn.disabled = true;
        textInput.disabled = true;
        setStatus("Done.");
      }
    } else if (msg.type === "error") {
      addBubble("error", msg.text);
    }
  };
}
connect();

function setStatus(text) { statusEl.textContent = text; }

function addBubble(role, text, isHtml = false) {
  const div = document.createElement("div");
  div.className = "bubble " + role;
  if (isHtml) {
    div.innerHTML = text;
  } else {
    div.textContent = text;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderDraft(draft) {
  draftEl.innerHTML = "";
  for (const key of FIELD_ORDER) {
    let value = draft[key];
    if (Array.isArray(value)) value = value.join(", ");
    const row = document.createElement("div");
    row.className = "field-row";
    row.innerHTML = `<span class="label">${key}</span><span class="value ${value ? "" : "empty"}">${value || "-- empty --"}</span>`;
    draftEl.appendChild(row);
  }
}

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  const utter = new SpeechSynthesisUtterance(text);
  window.speechSynthesis.speak(utter);
}

// --- Mic recording (push to talk: click to start, click again to stop+send) ---
micBtn.addEventListener("click", async () => {
  if ("speechSynthesis" in window) {
    window.speechSynthesis.cancel();
  }

  if (!recording) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(chunks, { type: "audio/webm" });
      ws.send(blob);
      setStatus("Transcribing...");
      stream.getTracks().forEach((t) => t.stop());
    };
    mediaRecorder.start();
    recording = true;
    micBtn.classList.add("recording");
    setStatus("Recording... click again to stop");
  } else {
    mediaRecorder.stop();
    recording = false;
    micBtn.classList.remove("recording");
  }
});

textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && textInput.value.trim()) {
    const text = textInput.value.trim();
    addBubble("user", text);
    ws.send(JSON.stringify({ type: "text", text }));
    textInput.value = "";
  }
});
</script>
</body>
</html>
