<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice to Jira</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #f4f3ee;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
  }
  .panel {
    background: #fff;
    border: 1px solid #e0ddd3;
    border-radius: 12px;
    padding: 16px;
  }
  .chat-panel { display: flex; flex-direction: column; height: 620px; }
  .messages { flex: 1; overflow-y: auto; padding: 8px 4px; }
  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-bottom: 10px;
    line-height: 1.45;
    font-size: 14.5px;
    white-space: pre-wrap;
  }
  .bubble.user { background: #dce7f7; margin-left: auto; border-bottom-right-radius: 4px; }
  .bubble.agent { background: #eee9dd; margin-right: auto; border-bottom-left-radius: 4px; }
  .bubble.system { background: #dff0e0; margin: 0 auto; text-align: center; font-size: 13px; }
  .bubble.error { background: #f7dcdc; margin-right: auto; }
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 12px;
    border-top: 1px solid #eee;
  }
  #mic-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 22px;
    background: #3a6fd8; color: white;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #mic-btn.recording { background: #d8503a; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(216,80,58,0.4);} 50% { box-shadow: 0 0 0 10px rgba(216,80,58,0);} }
  #status { font-size: 13px; color: #777; flex: 1; }
  #text-fallback {
    flex: 1; padding: 10px 12px; border-radius: 20px; border: 1px solid #ddd;
    font-size: 14px;
  }
  h3 { margin-top: 0; font-size: 15px; }
  .field-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0efe9; font-size: 13px; }
  .field-row .label { color: #888; }
  .field-row .value { font-weight: 600; text-align: right; max-width: 60%; }
  .field-row .value.empty { color: #bbb; font-weight: 400; }
</style>
</head>
<body>
<div class="app">

  <div class="panel chat-panel">
    <h3>Voice to Jira</h3>
    <div class="messages" id="messages"></div>
    <div class="controls">
      <button id="mic-btn" title="Click to talk">&#127908;</button>
      <input id="text-fallback" placeholder="...or type instead of talking" />
      <span id="status">Click the mic to start</span>
    </div>
  </div>

  <div class="panel">
    <h3>Ticket draft</h3>
    <div id="draft-fields"></div>
  </div>

</div>

<script>
const FIELD_ORDER = ["project", "issuetype", "summary", "description", "priority"];
const messagesEl = document.getElementById("messages");
const micBtn = document.getElementById("mic-btn");
const statusEl = document.getElementById("status");
const textInput = document.getElementById("text-fallback");
const draftEl = document.getElementById("draft-fields");

let ws = null;
let mediaRecorder = null;
let chunks = [];
let recording = false;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => setStatus("Connected. Click the mic to start.");
  ws.onclose = () => setStatus("Disconnected.");
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === "transcript") {
      addBubble("user", msg.text);
    } else if (msg.type === "agent") {
      addBubble("agent", msg.text);
      speak(msg.text);
      renderDraft(msg.draft || {});
      if (msg.ticket_created) {
        addBubble("system", "Ticket created. Conversation complete.");
        micBtn.disabled = true;
        textInput.disabled = true;
        setStatus("Done.");
      }
    } else if (msg.type === "error") {
      addBubble("error", msg.text);
    }
  };
}
connect();

function setStatus(text) { statusEl.textContent = text; }

function addBubble(role, text) {
  const div = document.createElement("div");
  div.className = "bubble " + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderDraft(draft) {
  draftEl.innerHTML = "";
  for (const key of FIELD_ORDER) {
    const value = draft[key];
    const row = document.createElement("div");
    row.className = "field-row";
    row.innerHTML = `<span class="label">${key}</span><span class="value ${value ? "" : "empty"}">${value || "-- empty --"}</span>`;
    draftEl.appendChild(row);
  }
}

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  const utter = new SpeechSynthesisUtterance(text);
  window.speechSynthesis.speak(utter);
}

// --- Mic recording (push to talk: click to start, click again to stop+send) ---
micBtn.addEventListener("click", async () => {
  if (!recording) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(chunks, { type: "audio/webm" });
      ws.send(blob);
      setStatus("Transcribing...");
      stream.getTracks().forEach((t) => t.stop());
    };
    mediaRecorder.start();
    recording = true;
    micBtn.classList.add("recording");
    setStatus("Recording... click again to stop");
  } else {
    mediaRecorder.stop();
    recording = false;
    micBtn.classList.remove("recording");
  }
});

textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && textInput.value.trim()) {
    const text = textInput.value.trim();
    addBubble("user", text);
    ws.send(JSON.stringify({ type: "text", text }));
    textInput.value = "";
  }
});
</script>
</body>
</html>
